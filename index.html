<!DOCTYPE html>
<html lang="ko" data-theme="light" data-font-size="m">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>spark</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1E3A5F" />
  <link rel="icon" href="icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />

  <!-- 스타일 -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 헤더 -->
  <header id="app-header">
    <h1 class="logo">SPARK</h1>
    <button id="more-menu-toggle" class="more-menu-toggle" type="button" aria-label="더보기 메뉴" aria-expanded="false">⋮</button>

    <!-- 더보기 메뉴 -->
    <div id="more-menu" class="more-menu" hidden>
      <button id="export-btn" class="more-menu-item" type="button">메모 내보내기</button>
      <button id="import-btn" class="more-menu-item" type="button">메모 가져오기</button>
      <div class="more-menu-item more-menu-fontsize">
        <span class="more-menu-fontsize-label">글자크기</span>
        <div class="fontsize-stepper">
          <div class="fontsize-dots" role="group" aria-label="글자크기 단계">
            <span class="fontsize-dot" data-size="xs"></span>
            <span class="fontsize-dot" data-size="s"></span>
            <span class="fontsize-dot" data-size="m"></span>
            <span class="fontsize-dot" data-size="l"></span>
            <span class="fontsize-dot" data-size="xl"></span>
          </div>
          <div class="fontsize-btn-group">
            <button id="fontsize-decrease" class="fontsize-step-btn" type="button" aria-label="글자크기 작게">−</button>
            <button id="fontsize-increase" class="fontsize-step-btn" type="button" aria-label="글자크기 크게">+</button>
          </div>
        </div>
      </div>
      <button id="dark-mode-btn" class="more-menu-item more-menu-toggle-item" type="button" aria-pressed="false">
        다크모드
        <span class="more-menu-toggle-indicator" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <!-- 메모 입력/목록 영역 -->
  <main id="app-main">
    <!-- 메모 입력 영역 -->
    <section class="memo-editor">
      <textarea id="memo-input" placeholder="메모를 입력하세요..." rows="6"></textarea>

      <!-- 첨부 이미지 미리보기 -->
      <div id="editor-image-preview" class="editor-image-preview"></div>

      <div class="editor-actions">
        <div class="editor-image-buttons">
          <button id="image-add-btn" class="icon-btn" type="button" aria-label="이미지 추가">🖼️</button>
          <button id="image-camera-btn" class="icon-btn" type="button" aria-label="사진 촬영">📷</button>
        </div>
        <button id="star-toggle" class="icon-btn" type="button" aria-label="중요 메모로 표시" aria-pressed="false">★</button>
        <button id="save-btn" class="primary-btn" type="button">저장</button>
      </div>
    </section>

    <!-- 이미지 선택용 숨김 파일 입력 (모바일 file input 제약으로 display:none 대신 시각적으로만 숨김) -->
    <input type="file" id="image-gallery-input" class="visually-hidden" accept="image/*" />
    <input type="file" id="image-camera-input" class="visually-hidden" accept="image/*" capture="environment" />

    <!-- 검색 & 필터 -->
    <section class="memo-toolbar">
      <input type="text" id="search-input" placeholder="메모 검색" />
      <button id="filter-toggle" class="icon-btn" type="button" aria-label="중요 메모만 보기" aria-pressed="false">★</button>
    </section>

    <!-- 메모 목록 -->
    <section class="memo-list-section">
      <ul id="memo-list"></ul>
      <p id="empty-message" class="empty-message">저장된 메모가 없습니다.</p>
    </section>

    <!-- 상세보기 화면 -->
    <section class="detail-view" hidden>
      <div class="detail-header">
        <button id="detail-back-btn" class="detail-back-btn" type="button" aria-label="뒤로가기">←</button>
      </div>
      <div class="detail-body">
        <p id="detail-content" class="detail-content"></p>
        <div id="detail-images" class="detail-images"></div>
        <p id="detail-date" class="detail-date"></p>
      </div>
      <div class="detail-actions">
        <button id="detail-edit-btn" class="detail-action-btn" type="button">수정</button>
        <button id="detail-share-btn" class="detail-action-btn" type="button">공유</button>
        <button id="detail-copy-btn" class="detail-action-btn" type="button">복사</button>
        <button id="detail-delete-btn" class="detail-action-btn detail-action-btn--danger" type="button">삭제</button>
      </div>
    </section>
  </main>

  <!-- 푸터 -->
  <footer id="app-footer">
  </footer>

  <!-- 메모 가져오기용 숨김 파일 입력 -->
  <!-- display:none 대신 시각적으로만 숨김: 일부 모바일 브라우저(iOS Safari 등)는
       display:none인 file input에 대해 .click()으로 선택창을 여는 것을 막는다 -->
  <input type="file" id="import-file-input" class="visually-hidden" accept="application/json,.json" />

  <!-- 토스트 알림 -->
  <div id="toast" class="toast" hidden></div>

  <script src="js/app.js"></script>
  <script src="js/sw-register.js"></script>
</body>
</html>
